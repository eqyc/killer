apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-service
  namespace: killer-erp
spec:
  selector:
    matchLabels:
      app: maintenance-service
  replicas: 1
  template:
    metadata:
      labels:
        app: maintenance-service
    spec:
      containers:
        - name: maintenance-service
          image: ghcr.io/example/maintenance-service:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          # 如果应用需要写临时文件，必须挂载 emptyDir
          # volumeMounts:
          #   - name: tmp
          #     mountPath: /tmp
      # volumes:
      #   - name: tmp
      #     emptyDir: {}
