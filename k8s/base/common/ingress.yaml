apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: killer-gateway
  namespace: killer-erp
spec:
  rules:
    - host: killer.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
