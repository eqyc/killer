# cargo-deny 配置文件 (最新 0.16+ 语法)

[advisories]
# 漏洞检查默认启用
# 忽略特定的 Advisory
ignore = [
    # paste crate is unmaintained but widely used indirectly (e.g. by clickhouse -> polonius-the-crab)
    "RUSTSEC-2024-0436"
]

[licenses]
# 允许的许可证白名单
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
# 信任度阈值
confidence-threshold = 0.8
# 忽略私有工作区项目的许可证检查 (解决 error[unlicensed] 报错)
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# 允许同一依赖的多个版本共存，但发出警告
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]