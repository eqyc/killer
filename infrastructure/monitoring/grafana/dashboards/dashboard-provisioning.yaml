# Grafana 仪表盘自动加载配置

apiVersion: 1

providers:
  - name: 'ERP System Dashboards'
    orgId: 1
    folder: 'ERP'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
