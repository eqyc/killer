# Dependabot 配置
# 自动更新依赖并创建 PR

version: 2
updates:
  # Rust 依赖更新
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "eqyc"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # 将小版本更新分组
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
      # OpenTelemetry 相关依赖分组
      opentelemetry:
        patterns:
          - "opentelemetry*"
      # 数据库驱动分组
      database-drivers:
        patterns:
          - "sqlx"
          - "clickhouse"
          - "redis"

  # GitHub Actions 更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Docker 镜像更新
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
