name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component should this feature be added to?
      options:
        - API Gateway
        - Analytics Service
        - CRM Service
        - Financial Service
        - HR Service
        - Sales Service
        - SCM Service
        - Warehouse Service
        - Production Service
        - Quality Service
        - Project Service
        - Materials Service
        - Shipping Service
        - Treasury Service
        - Controlling Service
        - Maintenance Service
        - MDG Service
        - Infrastructure
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe alternative solutions you've considered

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Are you willing to submit a PR?
      description: We appreciate contributions!
      options:
        - label: "Yes, I'm willing to submit a PR"
          required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups
