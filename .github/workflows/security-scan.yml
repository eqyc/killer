name: Security Scan

on:
  schedule:
    # 每天 UTC 3:00 运行
    - cron: '0 3 * * *'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Rust 依赖安全审计
  cargo-audit:
    name: Cargo Audit (Vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --json | tee audit-report.json

      - name: Upload audit report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cargo-audit-report
          path: audit-report.json

  # 依赖许可证和安全检查
  cargo-deny:
    name: Cargo Deny (Licenses & Bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  # 代码安全扫描 (SAST)
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan --config=auto --sarif --output=semgrep.sarif .

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # 容器镜像扫描
  trivy-filesystem:
    name: Trivy (Filesystem Scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Run Trivy (Table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # Docker Compose 配置扫描
  trivy-config:
    name: Trivy (Config Scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          exit-code: '0'

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-config-results.sarif'

  # Kubernetes 清单扫描
  kubesec:
    name: Kubesec (K8s Manifests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run kubesec scanner
        run: |
          docker run --rm -v $(pwd):/src -w /src kubesec/kubesec:v2 scan k8s/base/services/*/deployment.yaml --format sarif --output kubesec-results.sarif --exit-code 0

      - name: Upload Kubesec scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: kubesec-results.sarif

  # 密钥泄露扫描
  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_NO_V=${VERSION#v}
          curl -L -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION_NO_V}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . -v --redact --no-git

  # CodeQL 分析
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'rust' ]  # Rust 项目

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  # SBOM 生成
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate SBOM
        run: |
          cargo sbom > sbom.json
          cargo sbom --output-format cyclone_dx_json_1_6 > sbom-cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: |
            sbom.json
            sbom-cyclonedx.xml

  # 汇总安全扫描结果
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, semgrep, trivy-filesystem, trivy-config, kubesec, gitleaks]
    if: always()
    steps:
      - name: Security scan completed
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security scans have completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scans performed:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cargo Audit (Rust dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cargo Deny (Licenses & banned crates)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Semgrep (SAST)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy (Filesystem & Config)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Kubesec (Kubernetes manifests)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Gitleaks (Secret scanning)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the Security tab for detailed findings." >> $GITHUB_STEP_SUMMARY
